<html>
  <head>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="navbar">
        <div class="navbar-inner">
            <div class="navbar-left"><h1>The UX <span class="orange-t">Review</span></h1></div>
            <div class="navbar-middle">
                <a href="">Home</a>
                <img src="./images/icons/star-solid-full.png" alt="star">
                <a href="">Latest Articles</a>
                <img src="./images/icons/star-solid-full.png" alt="star">
                <a href="">Authors</a>
                <img src="./images/icons/star-solid-full.png" alt="star">
                <a href="">Community</a>
            </div>
            <div class="navbar-right">
                <button>SUBSCRIBE NOW</button>
            </div>
        </div>
    </div>
    <div class="hero">
        <div class="hero-decor-l"></div>
        <div class="hero-decor-r"></div>
      <div class="container">
        <div class="hero_content">
          <div class="hero_left">
            <div class="hero_label box-shadow">
              <p>🔥 Trending Now</p>
            </div>
            <div class="hero_text">
              <h1>
                BRUTAL <br />
                <span class="red-t">THOUGHTS</span> <br />
                <span class="blue-t">BOLD IDEAS</span>
              </h1>
            </div>
            <div class="hero-des box-shadow">
              <h3>
                Raw, unfiltered content about tech, design, and culture. No
                sugar-coating, just pure truth that hits different.
              </h3>
            </div>
            <div class="hero-buttons">
              <div class="hero-but1">
                <button class="box-shadow" type="button ">
                  <div>
                    <img
                      src="./images/icons/rocket-solid-full.png"
                      alt="rocket"
                    />
                  </div>
                  <div><span>START READING</span></div>
                </button>
              </div>
              <div class="hero-but2">
                <button class="box-shadow" type="button">
                  <div>
                    <img src="./images/icons/play-solid-full.png" alt="play" />
                  </div>
                  <div><span>WATCH INTRO</span></div>
                </button>
              </div>
            </div>
          </div>
          <div class="hero_right">
            <div class="inner-content-r">
              <div class="hero-img-label box-shadow"><p>Featured</p></div>
              <div class="hero-img box-shadow">
                <img src="./images/hero-img.png" alt="hero" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
